name: roadmap-merge-sync

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  sync:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse Roadmap-Item from PR body
        id: parse
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          slug=$(printf '%s' "$PR_BODY" | grep -E '^Roadmap-Item: ' | head -1 | sed 's/^Roadmap-Item: *//' | tr -d '\r' | xargs || true)
          if [ -z "$slug" ]; then
            echo "No Roadmap-Item: marker in PR body. Exiting."
            echo "slug=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Parsed slug: $slug"
          echo "slug=$slug" >> "$GITHUB_OUTPUT"

      - name: Move item to Done in roadmap.md
        if: steps.parse.outputs.slug != ''
        env:
          SLUG: ${{ steps.parse.outputs.slug }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: python3 .github/scripts/roadmap_merge_sync.py "$SLUG" "$PR_NUM"

      - name: Commit and push
        if: steps.parse.outputs.slug != ''
        env:
          SLUG: ${{ steps.parse.outputs.slug }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          if git diff --quiet roadmap.md; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add roadmap.md
          git commit -m "roadmap: mark $SLUG done (#$PR_NUM) [skip ci]"
          if ! git push; then
            echo "Push failed, retrying with rebase..."
            git pull --rebase origin main
            git push
          fi
